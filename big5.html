<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쉐도우그램 Big5 성격 검사</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="sg-data.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: rgba(124,58,237,0.3);
    --shadow-low: #10b981;
    --shadow-mid: #f59e0b;
    --shadow-high: #ef4444;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  header {
    background: linear-gradient(135deg, #1a0533 0%, #0f0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    text-align: center;
  }
  header .logo { font-size: 13px; color: var(--accent2); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── 섹션 공통 ── */
  .section { display: none; }
  .section.active { display: block; }
  .container { max-width: 680px; margin: 0 auto; padding: 28px 20px; }

  /* ── 카드 ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card h2 { font-size: 18px; margin-bottom: 10px; }
  .card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ── 코드 입력 ── */
  #codeSection .card { text-align: center; padding: 40px 24px; }
  .code-icon { font-size: 48px; margin-bottom: 16px; }
  .code-input-wrap { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
  input[type=text] {
    background: #0f0f1a;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 16px;
    width: 220px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
    transition: border .2s;
  }
  input[type=text]:focus { border-color: var(--accent2); }
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:hover { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent2);
    border-radius: 10px;
    padding: 11px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-outline:hover { background: rgba(124,58,237,.15); }
  .error-msg { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 18px; }

  /* ── 이름 입력 ── */
  #nameSection .card { text-align: center; padding: 36px 24px; }

  /* ── 검사 ── */
  .progress-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar { background: #1e1e35; border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
  }
  .q-dim-label {
    display: inline-block;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    background: rgba(168,85,247,.12);
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 14px;
  }
  .q-text { font-size: 17px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }

  /* ── Likert 척도 ── */
  .likert-scale { display: flex; flex-direction: column; gap: 10px; }
  .likert-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); padding: 0 4px; margin-bottom: 4px; }
  .likert-options { display: flex; gap: 10px; justify-content: center; }
  .likert-btn {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .likert-btn .lbl { font-size: 9px; font-weight: 400; }
  .likert-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(168,85,247,.1); }
  .likert-btn.selected { border-color: var(--accent2); background: var(--accent); color: #fff; }
  .likert-btn[data-v="1"].selected { background: #1e3a5f; border-color: #3b82f6; }
  .likert-btn[data-v="2"].selected { background: #1e2e40; border-color: #60a5fa; }
  .likert-btn[data-v="3"].selected { background: #2a1f40; border-color: var(--accent); }
  .likert-btn[data-v="4"].selected { background: #3b1a5f; border-color: var(--accent2); }
  .likert-btn[data-v="5"].selected { background: #4c1264; border-color: #d946ef; }

  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  .q-counter { font-size: 12px; color: var(--muted); }

  /* ── 로딩 ── */
  #loadingSection .container { text-align: center; padding: 80px 20px; }
  .loading-orbit { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent2); animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 결과 ── */
  .result-header {
    background: linear-gradient(135deg, #2d1054, #1a0533);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-type-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border-radius: 99px;
    padding: 6px 20px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  .result-name { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
  .result-subtitle { font-size: 14px; color: var(--muted); }

  /* ── 차트 영역 ── */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 560px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .chart-card h3 { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .chart-wrap { position: relative; height: 220px; }

  /* ── OCEAN 점수 바 ── */
  .ocean-bars { display: flex; flex-direction: column; gap: 14px; }
  .ocean-item {}
  .ocean-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .ocean-label { font-size: 13px; font-weight: 600; }
  .ocean-label span { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 6px; }
  .ocean-score { font-size: 13px; font-weight: 700; }
  .ocean-bar-track { background: #1e1e35; border-radius: 99px; height: 8px; overflow: hidden; }
  .ocean-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(.34,1.56,.64,1); }

  /* ── 그림자 강도 카드 ── */
  .shadow-card {
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    border: 1.5px solid;
  }
  .shadow-card.low { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.35); }
  .shadow-card.mid { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.35); }
  .shadow-card.high { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.35); }
  .shadow-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .shadow-badge { font-size: 28px; }
  .shadow-title { font-size: 17px; font-weight: 700; }
  .shadow-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .shadow-meter { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .shadow-meter-bar { flex: 1; background: #1e1e35; border-radius: 99px; height: 10px; overflow: hidden; }
  .shadow-meter-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.34,1.56,.64,1); }
  .shadow-meter-fill.low { background: linear-gradient(90deg, #10b981, #34d399); }
  .shadow-meter-fill.mid { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .shadow-meter-fill.high { background: linear-gradient(90deg, #ef4444, #f87171); }
  .shadow-meter-pct { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }
  .shadow-section-title { font-size: 12px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; margin-top: 12px; }
  .shadow-message { font-size: 15px; line-height: 1.75; color: var(--text); font-style: italic; }
  .shadow-tips { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .shadow-tips li { font-size: 14px; line-height: 1.6; color: var(--text); padding-left: 20px; position: relative; }
  .shadow-tips li::before { content: '→'; position: absolute; left: 0; color: var(--accent2); font-style: normal; }

  /* ── 유형 설명 ── */
  .type-detail-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }
  .type-detail-card .tag { font-size: 11px; letter-spacing: 2px; color: var(--accent2); text-transform: uppercase; margin-bottom: 8px; }
  .type-detail-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .type-detail-card .emoji { font-size: 40px; margin-bottom: 12px; }
  .type-detail-card p { font-size: 14px; color: var(--muted); line-height: 1.75; }

  /* ── 치원 설명 태그 ── */
  .dim-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 700;
    margin-right: 6px;
    margin-bottom: 6px;
  }
  .dim-E { background: rgba(251,191,36,.15); color: #fbbf24; }
  .dim-I { background: rgba(147,197,253,.15); color: #93c5fd; }
  .dim-N-type { background: rgba(167,243,208,.15); color: #6ee7b7; }
  .dim-S { background: rgba(253,186,116,.15); color: #fdba74; }
  .dim-F { background: rgba(249,168,212,.15); color: #f9a8d4; }
  .dim-T { background: rgba(165,243,252,.15); color: #a5f3fc; }
  .dim-J { background: rgba(196,181,253,.15); color: #c4b5fd; }
  .dim-P { background: rgba(110,231,183,.15); color: #6ee7b7; }

  /* ── 구분선 ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* ── 하단 버튼 ── */
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
  .result-actions .btn { flex: 1; min-width: 140px; text-align: center; }

  /* ── 모바일 ── */
  @media (max-width: 440px) {
    .likert-btn { width: 44px; height: 44px; font-size: 13px; }
    .q-text { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Shadowgram</div>
  <h1>Big5 성격 검사</h1>
  <p>IPIP 50문항 · 과학적 성격 분석 + 쉐도우그램 유형</p>
</header>

<!-- ① 검사 -->
<section id="quizSection" class="section active">
  <div class="container">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="progLabel">1 / 50</span>
        <span id="progPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-dim-label" id="qDimLabel">개방성</div>
      <div class="q-text" id="qText"></div>
      <div class="likert-scale">
        <div class="likert-labels">
          <span>전혀 아니다</span>
          <span>보통</span>
          <span>매우 그렇다</span>
        </div>
        <div class="likert-options" id="likertOptions">
          <button class="likert-btn" data-v="1" onclick="selectAnswer(1)">1<span class="lbl">전혀</span></button>
          <button class="likert-btn" data-v="2" onclick="selectAnswer(2)">2<span class="lbl">아니다</span></button>
          <button class="likert-btn" data-v="3" onclick="selectAnswer(3)">3<span class="lbl">보통</span></button>
          <button class="likert-btn" data-v="4" onclick="selectAnswer(4)">4<span class="lbl">그렇다</span></button>
          <button class="likert-btn" data-v="5" onclick="selectAnswer(5)">5<span class="lbl">매우</span></button>
        </div>
      </div>
      <div class="q-nav">
        <button class="btn-outline" id="prevBtn" onclick="prevQ()" style="visibility:hidden">← 이전</button>
        <span class="q-counter" id="qCounter">1 / 50</span>
        <button class="btn" id="nextBtn" onclick="nextQ()" disabled>다음 →</button>
      </div>
    </div>
  </div>
</section>

<!-- ④ 로딩 -->
<section id="loadingSection" class="section">
  <div class="container">
    <div class="loading-orbit"></div>
    <p style="font-size:16px; margin-bottom:6px;">분석 중...</p>
    <p style="font-size:13px; color:var(--muted);">Big5 점수와 쉐도우그램 유형을 계산하고 있어요</p>
  </div>
</section>

<!-- ⑤ 결과 -->
<section id="resultSection" class="section">
  <div class="container">

    <!-- 유형 헤더 -->
    <div class="result-header">
      <div class="result-type-badge" id="resTypeBadge">INTJ</div>
      <div id="resTypeEmoji" style="font-size:52px; margin: 12px 0;">🌑</div>
      <div class="result-name" id="resTypeName">전략가</div>
      <div class="result-subtitle" id="resName">님의 쉐도우그램 유형</div>
    </div>

    <!-- 차트 -->
    <div class="charts-grid">
      <div class="chart-card">
        <h3>📡 Big5 레이더</h3>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 요인별 점수</h3>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
    </div>

    <!-- OCEAN 상세 바 -->
    <div class="card">
      <h3 style="font-size:14px; margin-bottom:16px; letter-spacing:1px; text-transform:uppercase; color:var(--muted);">OCEAN 요인 상세</h3>
      <div class="ocean-bars" id="oceanBars"></div>
    </div>

    <!-- 그림자 강도 카드 -->
    <div id="shadowCard"></div>

    <!-- 쉐도우그램 유형 설명 -->
    <div class="type-detail-card" id="typeDetail"></div>

    <!-- 차원 분석 -->
    <div class="card" id="dimAnalysis"></div>

    <hr class="divider">

    <!-- 액션 버튼 -->
    <div class="result-actions">
      <button class="btn" onclick="goToFullReport()">📄 쉐도우그램 전체 보고서</button>
      <button class="btn-outline" onclick="restartQuiz()">🔄 다시 검사하기</button>
    </div>
    <p style="font-size:11px; color:var(--muted); margin-top:10px; text-align:center;">
      Big5 결과는 쉐도우그램 개인 보고서에서 더 깊이 탐색할 수 있어요.
    </p>

  </div>
</section>

<script>
// ═══════════════════════════════════════════
// IPIP Big5 50문항 (한국어)
// 5요인 × 10문항, 역채점 표시: R
// dim: O=개방성, C=성실성, E=외향성, A=친화성, N=신경증
// ═══════════════════════════════════════════
const B5Q = [
  // ── 외향성 (Extraversion) ──
  { dim:'E', r:false, text:"사람들과 함께 있을 때 생기가 넘친다." },
  { dim:'E', r:false, text:"모임에서 대화를 주도하는 편이다." },
  { dim:'E', r:false, text:"처음 보는 사람에게도 먼저 말을 건다." },
  { dim:'E', r:true,  text:"군중 속에서도 혼자인 느낌이 든다." },
  { dim:'E', r:false, text:"여럿이 함께하는 활동을 즐긴다." },
  { dim:'E', r:true,  text:"사람이 많은 곳에 있으면 피곤하다." },
  { dim:'E', r:false, text:"사람들에게 주목받는 것이 좋다." },
  { dim:'E', r:true,  text:"낯선 사람과 이야기하는 것이 불편하다." },
  { dim:'E', r:false, text:"파티나 사교 모임을 즐긴다." },
  { dim:'E', r:true,  text:"조용히 배경에 머무는 것이 편하다." },

  // ── 친화성 (Agreeableness) ──
  { dim:'A', r:false, text:"타인의 감정에 관심이 많고 공감을 잘 한다." },
  { dim:'A', r:false, text:"다른 사람을 도울 기회를 찾는다." },
  { dim:'A', r:true,  text:"사람들이 말하는 것에 별 관심이 없다." },
  { dim:'A', r:false, text:"다른 사람의 관점에서 생각해보려 한다." },
  { dim:'A', r:false, text:"갈등보다 협력을 선호한다." },
  { dim:'A', r:true,  text:"사람들을 조종하는 것이 때로 필요하다고 느낀다." },
  { dim:'A', r:false, text:"다른 사람의 행복이 나에게도 중요하다." },
  { dim:'A', r:true,  text:"어떤 대가를 치르더라도 이기는 것이 좋다." },
  { dim:'A', r:false, text:"사람들에 대한 믿음이 있다." },
  { dim:'A', r:true,  text:"복수하는 것이 용서하는 것보다 낫다고 생각한다." },

  // ── 성실성 (Conscientiousness) ──
  { dim:'C', r:false, text:"항상 준비를 철저히 한다." },
  { dim:'C', r:true,  text:"내 물건들을 어지럽히는 경향이 있다." },
  { dim:'C', r:false, text:"세부 사항에 주의를 기울인다." },
  { dim:'C', r:true,  text:"약속이나 의무를 자주 잊어버린다." },
  { dim:'C', r:false, text:"시간표나 일정을 잘 지킨다." },
  { dim:'C', r:true,  text:"일을 하기 전에 오래 미루는 편이다." },
  { dim:'C', r:false, text:"맡은 일을 끝까지 해낸다." },
  { dim:'C', r:false, text:"정확하고 체계적으로 일한다." },
  { dim:'C', r:true,  text:"규칙이나 규정을 잘 어기는 편이다." },
  { dim:'C', r:false, text:"높은 목표를 세우고 이를 달성하기 위해 노력한다." },

  // ── 신경증 (Neuroticism) ──
  { dim:'N', r:false, text:"기분이 쉽게 변한다." },

// ── Big5 → 쉐도우그램 유형 매핑 ──
// E>50 → E (외향), E≤50 → I (내향)
// O>50 → N (직관), O≤50 → S (감각)
// A>50 → F (감정), A≤50 → T (사고)
// C>50 → J (판단), C≤50 → P (인식)
function oceanToSgType(scores) {
  const d1 = scores.E > 50 ? 'E' : 'I';
  const d2 = scores.O > 50 ? 'N' : 'S';
  const d3 = scores.A > 50 ? 'F' : 'T';
  const d4 = scores.C > 50 ? 'J' : 'P';
  return { d1, d2, d3, d4, code: d1+d2+d3+d4 };
}

// ── 점수 계산 (0~100 정규화) ──
function calcScores(answers) {
  const raw = { O:0, C:0, E:0, A:0, N:0 };
  const cnt = { O:0, C:0, E:0, A:0, N:0 };
  B5Q.forEach((q, i) => {
    const v = answers[i];
    if (v == null) return;
    const scored = q.r ? (6 - v) : v;  // 역채점
    raw[q.dim] += scored;
    cnt[q.dim]++;
  });
  const scores = {};
  ['O','C','E','A','N'].forEach(d => {
    const max = cnt[d] * 5;
    const min = cnt[d] * 1;
    scores[d] = Math.round(((raw[d] - min) / (max - min)) * 100);
  });
  return scores;
}

function showSection(id) {

  window.scrollTo(0, 0);
}

// ── 검사 초기화 (페이지 로드 시 자동 실행) ──
function startQuiz() {
  answers = new Array(50).fill(null);
  currentQ = 0;
  renderQ();
  showSection('quizSection');
}

const DIM_ORDER_LABELS = { E:'외향성 (E)', A:'친화성 (A)', C:'성실성 (C)', N:'신경증 (N)', O:'개방성 (O)' };

function renderQ() {
  const q = B5Q[currentQ];
  const total = B5Q.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('progLabel').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progPct').textContent = `${pct}%`;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('qCounter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('qDimLabel').textContent = DIM_ORDER_LABELS[q.dim] || q.dim;
  document.getElementById('qText').textContent = q.text;

  const btns = document.querySelectorAll('.likert-btn');
  btns.forEach(btn => {
    btn.classList.remove('selected');
    if (answers[currentQ] != null && parseInt(btn.dataset.v) === answers[currentQ]) {
      btn.classList.add('selected');
    }
  });

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.disabled = (answers[currentQ] == null);
  nextBtn.textContent = currentQ === total - 1 ? '완료 ✓' : '다음 →';

  const prevBtn = document.getElementById('prevBtn');
  prevBtn.style.visibility = currentQ > 0 ? 'visible' : 'hidden';
}

function selectAnswer(v) {
  answers[currentQ] = v;
  document.querySelectorAll('.likert-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.v) === v);
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQ() {
  if (answers[currentQ] == null) return;
  if (currentQ === B5Q.length - 1) {
    calcResult();
    return;
  }
  currentQ++;
  renderQ();
}

function prevQ() {
  if (currentQ > 0) { currentQ--; renderQ(); }
}

// ── 결과 계산 ──
function calcResult() {
  showSection('loadingSection');
  setTimeout(() => {
    finalScores = calcScores(answers);
    renderResult(finalScores);
    showSection('resultSection');
  }, 1200);
}

function renderResult(scores) {
  const sgMap = oceanToSgType(scores);
  const sgCode = sgMap.code;
  const typeData = typeof TYPES !== 'undefined' ? TYPES[sgCode] : null;

  // 헤더
  document.getElementById('resTypeBadge').textContent = sgCode;
  document.getElementById('resName').textContent = '나의 쉐도우그램 유형';
  if (typeData) {
    document.getElementById('resTypeName').textContent = typeData.name || sgCode;
    document.getElementById('resTypeEmoji').textContent = typeData.emoji || '🌑';
  } else {
    document.getElementById('resTypeName').textContent = sgCode;
    document.getElementById('resTypeEmoji').textContent = '🌑';
  }

  // 차트 렌더링 (약간 딜레이)
  setTimeout(() => {
    renderRadar(scores);
    renderBar(scores);
  }, 100);

  // OCEAN 상세 바
  renderOceanBars(scores);

  // 그림자 강도 카드
  renderShadowCard(scores.N);

  // 유형 상세
  renderTypeDetail(sgCode, sgMap, typeData);

  // 차원 분석
  renderDimAnalysis(sgMap, scores);
}

  const d = { ...SHADOW_DATA[level], pct: nScore };
  const container = document.getElementById('shadowCard');

  const tipsHtml = d.tips.map(t => `<li>${t}</li>`).join('');
  container.innerHTML = `
    <div class="shadow-card ${level}">
      <div class="shadow-header">

  T: '사고적 판단 — 논리와 원칙으로 분석하며 객관적으로 결정합니다.',
  J: '판단적 생활 — 계획과 구조를 선호하며, 완결감을 중요시합니다.',
  P: '인식적 생활 — 유연하고 개방적으로 흐름에 따라 움직입니다.',
};

function renderDimAnalysis(sgMap, scores) {
  const el = document.getElementById('dimAnalysis');
  const dims = [
    { key: sgMap.d1, pair: ['E','I'], score: scores.E, label: '외향성', base:'E' },
    { key: sgMap.d2, pair: ['N','S'], score: scores.O, label: '개방성', base:'O' },
    { key: sgMap.d3, pair: ['F','T'], score: scores.A, label: '친화성', base:'A' },
    { key: sgMap.d4, pair: ['J','P'], score: scores.C, label: '성실성', base:'C' },
  ];

  let html = `<h3 style="font-size:14px; margin-bottom:16px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">차원별 분석</h3>`;
  dims.forEach(d => {
    const tagClass = `dim-${d.key === 'N' ? 'N-type' : d.key}`;
    html += `
      <div style="margin-bottom:14px;">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
          <span class="dim-tag ${tagClass}">${d.key}</span>
          <span style="font-size:13px; font-weight:600;">${DIM_EXPLAIN[d.key].split(' — ')[0]}</span>
        </div>
        <p style="font-size:13px; color:var(--muted); line-height:1.65; padding-left:4px;">${DIM_EXPLAIN[d.key].split(' — ')[1]}</p>
        <div style="font-size:11px; color:var(--muted); margin-top:4px; padding-left:4px;">Big5 기반: ${d.label} ${d.score}점</div>
      </div>`;
  });
  el.innerHTML = html;
}

// ── 전체 보고서로 이동 ──
function goToFullReport() {
  if (!finalScores) return;
  const sgMap = oceanToSgType(finalScores);
  const params = new URLSearchParams({
    type: sgMap.code,
    paid: '1',
    from: 'big5',
    nScore: finalScores.N
  });
  window.location.href = 'report.html?' + params.toString();
}

function restartQuiz() {
  finalScores = null;
  startQuiz();
}
</script>
