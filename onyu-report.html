<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>온유스쿨 · 부부클래스 — 소통스타일 상세 리포트</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0F121E;
  --bg2:    #161A28;
  --card:   #1E2233;
  --text:   #E8E4DC;
  --gold:   #C9A84C;
  --goldL:  #E8D090;
  --silver: #8899AA;
  --border: rgba(201,168,76,0.18);
  --green:  #4CAF82;
  --red:    #E05040;
  --A:      #C9A84C;
  --B:      #8A70C0;
}
html { font-size: 16px; scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; }

/* ── NAV ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(15,18,30,0.97); backdrop-filter: blur(8px); z-index: 100;
}
.nav-logo { font-size: 15px; font-weight: 900; letter-spacing: 0.08em; color: var(--gold); text-decoration: none; }
.nav-sub  { font-size: 11px; color: var(--silver); letter-spacing: 0.1em; }
.btn-pdf-dl {
  background: linear-gradient(135deg, var(--gold), var(--goldL));
  border: none; border-radius: 10px; color: #000;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 900;
  padding: 9px 18px; cursor: pointer; transition: opacity .2s; display: flex; align-items: center; gap: 6px;
}
.btn-pdf-dl:hover { opacity: .85; }
.btn-pdf-dl.loading { opacity: .6; cursor: not-allowed; }

/* ── 리포트 래퍼 ── */
#report-wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 100px; }

/* 커버 */
.cover {
  background: linear-gradient(145deg, #1a1228 0%, #0F121E 60%, #121824 100%);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 48px 32px 40px; text-align: center; margin-bottom: 32px;
  position: relative; overflow: hidden;
}
.cover::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,.08) 0%, transparent 70%);
}
.cover-kicker { font-size: 11px; letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
.cover-couple { display: flex; align-items: center; justify-content: center; gap: 28px; margin: 0 0 24px; }
.cover-person { text-align: center; }
.cover-icon { font-size: 44px; margin-bottom: 6px; }
.cover-type { font-size: 26px; font-weight: 900; }
.cover-label { font-size: 12px; margin-top: 3px; }
.cover-name { font-size: 13px; color: var(--silver); margin-top: 6px; }
.cover-heart { font-size: 32px; }
.cover-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(22px, 5vw, 32px); font-weight: 700; line-height: 1.4;
  margin-bottom: 10px;
}
.cover-title em { color: var(--gold); font-style: italic; }
.cover-date { font-size: 12px; color: var(--silver); margin-top: 14px; letter-spacing: 0.05em; }
.cover-badge {
  display: inline-block; margin-top: 16px;
  background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.3);
  border-radius: 99px; padding: 6px 18px;
  font-size: 12px; color: var(--gold); letter-spacing: 0.08em;
}

/* 섹션 공통 */
.section { margin-bottom: 36px; }
.sec-eyebrow { font-size: 11px; letter-spacing: 0.2em; color: var(--silver); margin-bottom: 6px; text-transform: uppercase; }
.sec-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(20px, 4.5vw, 28px); font-weight: 700; line-height: 1.35; margin-bottom: 20px;
}
.sec-title em { color: var(--gold); font-style: italic; }

/* 카드 */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; margin-bottom: 14px;
}
.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
  margin-bottom: 12px; text-transform: uppercase;
}
.card-body { font-size: 15px; line-height: 1.85; }

/* 타입 그리드 */
.type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
@media (max-width: 520px) { .type-grid { grid-template-columns: 1fr; } }

.type-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 22px;
}
.type-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.type-card-icon { font-size: 28px; }
.type-card-name { font-size: 17px; font-weight: 900; }
.type-card-sub { font-size: 12px; color: var(--silver); margin-top: 3px; line-height: 1.5; }

.trait-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  margin: 14px 0 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.trait-item {
  display: flex; gap: 9px; align-items: flex-start;
  font-size: 13px; line-height: 1.75; color: var(--silver);
  padding: 5px 0;
}
.trait-dot { flex-shrink: 0; margin-top: 6px; width: 5px; height: 5px; border-radius: 50%; }

/* 나비형 차트 */
.bf-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; margin-bottom: 14px;
}
.bf-legend-top {
  display: flex; gap: 20px; margin-bottom: 20px; font-size: 13px; font-weight: 700;
}
.bf-row { margin-bottom: 18px; }
.bf-row:last-child { margin-bottom: 0; }
.bf-dim-label { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; letter-spacing: 0.03em; }
.bf-poles { display: flex; justify-content: space-between; font-size: 11px; color: var(--silver); margin-bottom: 5px; }
.bf-bar-wrap {
  display: flex; align-items: center; height: 32px;
  background: rgba(255,255,255,.04); border-radius: 6px; overflow: hidden;
  position: relative;
}
.bf-bar-wrap::after {
  content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px; background: rgba(255,255,255,.18); transform: translateX(-50%);
  z-index: 2;
}
.bf-bar-a, .bf-bar-b {
  position: absolute; border-radius: 3px;
  transition: width .9s cubic-bezier(.34,1.56,.64,1);
}
.bf-bar-a { height: 50%; top: 0; background: linear-gradient(90deg, rgba(201,168,76,.9), rgba(201,168,76,.4)); }
.bf-bar-b { height: 50%; bottom: 0; background: linear-gradient(90deg, rgba(138,112,192,.9), rgba(138,112,192,.4)); }
.bf-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
.bf-val-a { font-size: 11px; color: var(--A); font-weight: 700; }
.bf-val-b { font-size: 11px; color: var(--B); font-weight: 700; }
.bf-diff-chip {
  font-size: 10px; padding: 2px 9px; border-radius: 99px; font-weight: 700;
}
.diff-low  { background: rgba(76,175,130,.15); color: #4CAF82; }
.diff-mid  { background: rgba(245,158,11,.15);  color: #fbbf24; }
.diff-high { background: rgba(224,80,64,.15);   color: #E05040; }

/* 가이드 아이템 */
.guide-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  font-size: 14px; line-height: 1.75;
}
.guide-item:last-child { border-bottom: none; }
.guide-num {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: rgba(201,168,76,.1); border: 1px solid rgba(201,168,76,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: var(--gold);
}
.guide-q {
  flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
  background: rgba(138,112,192,.1); border: 1px solid rgba(138,112,192,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: var(--B);
}

/* 디바이더 */
.divider { height: 1px; background: var(--border); margin: 32px 0; }

/* 푸터 */
.report-footer {
  text-align: center; padding: 32px 0 20px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--silver); letter-spacing: 0.05em; line-height: 2.2;
}

/* PDF 다운로드 플로팅 버튼 */
.fab-wrap {
  position: fixed; bottom: 28px; right: 24px; z-index: 200;
  display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
}
.fab {
  background: linear-gradient(135deg, var(--gold), var(--goldL));
  border: none; border-radius: 16px; color: #000;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 900;
  padding: 14px 22px; cursor: pointer; transition: all .2s;
  box-shadow: 0 8px 24px rgba(201,168,76,.35);
  display: flex; align-items: center; gap: 8px;
}
.fab:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,168,76,.45); }
.fab.loading { opacity: .65; cursor: not-allowed; transform: none; }
.fab-back {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; color: var(--silver);
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px;
  padding: 10px 16px; cursor: pointer; transition: .2s;
}
.fab-back:hover { border-color: var(--gold); color: var(--text); }

/* 에러 페이지 */
#error-screen {
  display: none; max-width: 400px; margin: 100px auto; text-align: center; padding: 0 20px;
}
.err-icon { font-size: 48px; margin-bottom: 16px; }
.err-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
.err-sub { font-size: 14px; color: var(--silver); line-height: 1.75; margin-bottom: 24px; }
.btn-back-home {
  display: inline-block; background: linear-gradient(135deg, var(--gold), var(--goldL));
  border: none; border-radius: 12px; color: #000;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 900;
  padding: 13px 28px; cursor: pointer; text-decoration: none;
}

/* 로딩 오버레이 */
#pdf-loading {
  display: none; position: fixed; inset: 0; z-index: 9999;
  background: rgba(15,18,30,.92); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
#pdf-loading.show { display: flex; }
.loader-ring {
  width: 48px; height: 48px; border-radius: 50%;
  border: 3px solid rgba(201,168,76,.2);
  border-top-color: var(--gold);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 14px; color: var(--silver); }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">온유스쿨 · 부부클래스</span>
  <span class="nav-sub">소통스타일 상세 리포트</span>
  <button class="btn-pdf-dl" id="nav-pdf-btn" onclick="downloadPDF()">
    <span>↓</span> PDF 저장
  </button>
</nav>

<!-- 에러 화면 -->
<div id="error-screen">
  <div class="err-icon">⚠️</div>
  <div class="err-title">리포트 데이터가 없습니다</div>
  <div class="err-sub">검사를 먼저 진행해 주세요.<br/>이미 검사를 마쳤다면 코드를 다시 입력해 주세요.</div>
  <a class="btn-back-home" href="onyu-couple.html">← 검사 페이지로</a>
</div>

<!-- 리포트 본문 -->
<div id="report-wrap" style="display:none;"></div>

<!-- 플로팅 버튼 -->
<div class="fab-wrap" id="fab-wrap" style="display:none;">
  <button class="fab" id="fab-pdf" onclick="downloadPDF()">⬇ PDF 다운로드</button>
  <button class="fab-back" onclick="history.back()">← 기본 결과로</button>
</div>

<!-- PDF 로딩 오버레이 -->
<div id="pdf-loading">
  <div class="loader-ring"></div>
  <div class="loader-text">PDF를 만들고 있어요...</div>
</div>

<script src="sg-data.js"></script>

// ── PDF 다운로드 ──
async function downloadPDF() {
  const fab = document.getElementById('fab-pdf');
  const navBtn = document.getElementById('nav-pdf-btn');
  const overlay = document.getElementById('pdf-loading');

  fab.classList.add('loading');
  fab.textContent = '생성 중...';
  navBtn.classList.add('loading');
  overlay.classList.add('show');

  try {
    const { jsPDF } = window.jspdf;
    const wrap = document.getElementById('report-wrap');
    const A4_W = 210, A4_H = 297;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // 페이지 너비에 맞게 캔버스 스케일 계산
    const scale = 2;
    const canvas = await html2canvas(wrap, {
      scale,
      useCORS: true,
      backgroundColor: '#0F121E',
      logging: false,
      windowWidth: 800,
    });

    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    const imgW = A4_W;
    const imgH = (canvas.height / canvas.width) * imgW;
    let y = 0;

    // 여러 페이지 분할
    while (y < imgH) {
      if (y > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, -y, imgW, imgH);
      y += A4_H;
    }

    const today = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\. /g, '-').replace('.', '');
    pdf.save(`온유스쿨_소통리포트_${nameA}_${nameB}_${today}.pdf`);
  } catch(e) {
    alert('PDF 생성 중 오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  } finally {
    fab.classList.remove('loading');
    fab.innerHTML = '⬇ PDF 다운로드';
    navBtn.classList.remove('loading');
    overlay.classList.remove('show');
  }
}
